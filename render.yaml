services:
  - type: web
    name: product-pipeline-monkey-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_REQUESTS_TABLE
        value: requests

  - type: web
    name: product-pipeline-monkey
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://product-pipeline-monkey-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
